<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escolha de Classe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <script src="js/shell-guard.js"></script>
  <link rel="stylesheet" href="css/flow.css" />
</head>
<body>
  
  <main class="panel">
    <h1>Cadastro do Jogador</h1>
    <p class="muted">Defina seu nome, data de nascimento, sexo e classe inicial.</p>
    <div class="warning">AVISO: voce nao podera mudar de classe depois que escolher.</div>

    <form id="setupForm">
      <div class="grid">
        <div>
          <label for="playerName">Nome</label>
          <input id="playerName" name="playerName" type="text" maxlength="24" required />
        </div>
        <div>
          <label for="playerBirthDate">Data de nascimento</label>
          <input id="playerBirthDate" name="playerBirthDate" type="date" required />
        </div>
      </div>

      <div class="grid" style="margin-top:12px;">
        <div>
          <label for="playerSex">Sexo</label>
          <select id="playerSex" name="playerSex" required>
            <option value="">Selecione</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
          </select>
        </div>
      </div>

      <div style="margin-top:12px;">
        <label for="playerPhoto">Foto do jogador (opcional)</label>
        <input id="playerPhoto" name="playerPhoto" type="file" accept="image/*" class="visually-hidden-input" />
        <label for="playerPhoto" class="photo-uploader">
          <div id="photoPreview" class="photo-preview">
            <span class="photo-icon">+</span>
            <span class="photo-tip">Toque para enviar foto</span>
          </div>
        </label>
      </div>

      <p class="muted" style="margin-top:14px;">Classes disponiveis:</p>
      <div id="classList" class="class-list"></div>

      <div id="errorMsg" class="error"></div>
      <button type="submit">Confirmar Classe</button>
    </form>
  </main>

  <script src="js/sfx.js"></script>
  <script src="js/class-select.js"></script>
</body>
</html>

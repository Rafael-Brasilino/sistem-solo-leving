<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema do Jogador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <video class="landing-video" autoplay muted loop playsinline preload="auto">
    <source src="assets/video/site-bg.mp4" type="video/mp4" />
  </video>
  <div class="hud-frame">
    <div class="hud-side hud-side-left"></div>
    <div class="hud-side hud-side-right"></div>
    <div class="systemBox">
      <div class="systemHeader">
        <div class="alertIcon">!</div>
        <div class="systemTitle">NOTIFICAÇÃO</div>
      </div>

      <div id="systemText" class="systemText"></div>

      <div id="actions" class="actions hidden">
        <button id="acceptBtn" type="button">Sim</button>
        <button id="rejectBtn" type="button">Nao</button>
      </div>
      <div id="choiceStatus" class="choiceStatus"></div>
    </div>
  </div>
  <script src="js/sfx.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
